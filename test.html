<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Test</title>

<style>
html,body{
    margin:0;
    width:100%;
    height:100%;
    background:#000;
    overflow:hidden;
}

video{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
}
#status{
    position:fixed;
    top:10px;
    left:10px;
    background:rgba(0,0,0,.7);
    color:#fff;
    padding:8px 12px;
    font-family:Arial;
    border-radius:6px;
}
</style>
</head>
<body>

<div id="status">Loading...</div>

<video
    id="video"
    autoplay
    muted
    playsinline
    preload="auto"
>
    <source src="Animation.mp4" type="video/mp4">
</video>

<script>
const video=document.getElementById("video");
const status=document.getElementById("status");

[
"loadstart",
"loadedmetadata",
"loadeddata",
"canplay",
"canplaythrough",
"playing",
"ended",
"error"
].forEach(event=>{
    video.addEventListener(event,()=>{
        console.log(event);
        status.innerHTML=event;
    });
});

video.play().catch(err=>{
    console.error(err);
    status.innerHTML="Play failed";
});
</script>

</body>
</html>
